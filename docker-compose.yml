version: "3.8"

services:
  butler-bot:
    build: .
    container_name: anime-butler-bot
    restart: unless-stopped
    environment:
      # Discord Bot
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DEV_GUILD_ID: ${DEV_GUILD_ID:-}

      # AI 推理后端（宿主机 LM Studio / Ollama）
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:1234/v1}
      AI_MODEL: ${AI_MODEL:-google/gemma-4}
      AI_API_KEY: ${AI_API_KEY:-not-needed-for-local}

      # 第三方 API
      ANILIST_API_URL: ${ANILIST_API_URL:-https://graphql.anilist.co}
      WEATHER_API_URL: ${WEATHER_API_URL:-https://api.open-meteo.com/v1/forecast}
      WEATHER_LAT: ${WEATHER_LAT:--33.8688}
      WEATHER_LON: ${WEATHER_LON:-151.2093}

      # 运行环境
      TZ: ${TZ:-Australia/Sydney}
      DATABASE_PATH: ${DATABASE_PATH:-/app/bot_data/butler.db}
    volumes:
      # 数据持久化：使用命名卷（Portainer 管理）
      - butler-data:/app/bot_data
    extra_hosts:
      # 让容器可以访问宿主机上运行的 LM Studio / Ollama
      - "host.docker.internal:host-gateway"

volumes:
  butler-data:
    # Portainer 会自动创建和管理此卷
    # 数据位置：/var/lib/docker/volumes/anime-butler-bot_butler-data/_data
